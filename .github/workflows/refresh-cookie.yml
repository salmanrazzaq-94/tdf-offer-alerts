name: Refresh TDF Cookie

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why the refresh was requested
        required: false
      source_run_id:
        description: Worker run id that requested refresh
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tdf-cookie-refresh
  cancel-in-progress: false

jobs:
  refresh-cookie:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Refresh TDF cookie with Browserbase
        run: |
          touch .env
          npm run login:browserbase
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          BROWSERBASE_CONTEXT_ID: ${{ secrets.BROWSERBASE_CONTEXT_ID }}
          TDF_EMAIL: ${{ secrets.TDF_EMAIL }}
          TDF_PASSWORD: ${{ secrets.TDF_PASSWORD }}
          COOKIE_FORM_TOKEN: ${{ secrets.COOKIE_FORM_TOKEN }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}

      - name: Notify worker if Browserbase refresh fails
        if: failure()
        run: |
          payload="$(node -e 'console.log(JSON.stringify({ reason: process.env.REASON, source_run_id: process.env.SOURCE_RUN_ID || "" }))')"
          curl --fail-with-body \
            --request POST \
            --header "content-type: application/json" \
            --data "$payload" \
            "${WORKER_BASE_URL%/}/refresh-failed?token=${COOKIE_FORM_TOKEN}"
        env:
          COOKIE_FORM_TOKEN: ${{ secrets.COOKIE_FORM_TOKEN }}
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          REASON: "Browserbase refresh workflow failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
