name: Telegram Commands

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tdf-telegram-commands
  cancel-in-progress: false

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Telegram commands
        run: npm run build && npm run telegram-commands
        env:
          TDF_COOKIE: ${{ secrets.TDF_COOKIE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit telegram command state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain data/telegram-state.json data/run-log.jsonl)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/telegram-state.json data/run-log.jsonl
            git commit -m "Update Telegram command state"
            git push
          else
            echo "No telegram command state changes to commit."
          fi
