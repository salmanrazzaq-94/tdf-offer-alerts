name: Worker Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test deployed Worker
        run: npm run smoke:worker
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          COOKIE_FORM_TOKEN: ${{ secrets.COOKIE_FORM_TOKEN }}
