name: Pre-check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run quality

  e2e:
    needs: pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Write E2E Worker secrets file
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = `${process.env.RUNNER_TEMP}/e2e-worker-secrets.json`;
          const values = {
            TELEGRAM_BOT_TOKEN: process.env.TELEGRAM_BOT_TOKEN,
            TELEGRAM_CHAT_ID: process.env.E2E_TELEGRAM_CHAT_ID,
            COOKIE_FORM_TOKEN: process.env.E2E_COOKIE_FORM_TOKEN,
            GITHUB_REFRESH_TOKEN: "e2e-disabled"
          };
          const missing = Object.entries(values)
            .filter(([, value]) => !value)
            .map(([key]) => key);
          if (missing.length > 0) {
            throw new Error(`Missing E2E Worker secrets: ${missing.join(", ")}`);
          }
          fs.writeFileSync(path, JSON.stringify(values));
          NODE
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          E2E_TELEGRAM_CHAT_ID: ${{ secrets.E2E_TELEGRAM_CHAT_ID }}
          E2E_COOKIE_FORM_TOKEN: ${{ secrets.E2E_COOKIE_FORM_TOKEN }}

      - name: Deploy isolated E2E Worker
        run: npm run worker:e2e-deploy -- --secrets-file "$RUNNER_TEMP/e2e-worker-secrets.json"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Browserbase login against E2E Worker
        run: |
          touch .env
          npm run login:browserbase
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          BROWSERBASE_CONTEXT_ID: ${{ secrets.E2E_BROWSERBASE_CONTEXT_ID }}
          TDF_EMAIL: ${{ secrets.TDF_EMAIL }}
          TDF_PASSWORD: ${{ secrets.TDF_PASSWORD }}
          COOKIE_FORM_TOKEN: ${{ secrets.E2E_COOKIE_FORM_TOKEN }}
          WORKER_BASE_URL: ${{ secrets.E2E_WORKER_BASE_URL }}

      - name: Exercise E2E Worker and Telegram delivery
        run: npm run worker:e2e
        env:
          E2E_WORKER_BASE_URL: ${{ secrets.E2E_WORKER_BASE_URL }}
          E2E_COOKIE_FORM_TOKEN: ${{ secrets.E2E_COOKIE_FORM_TOKEN }}
          E2E_TELEGRAM_CHAT_ID: ${{ secrets.E2E_TELEGRAM_CHAT_ID }}
