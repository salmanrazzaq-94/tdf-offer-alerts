name: Pre-check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run quality

  e2e:
    needs: pre-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Browserbase login for E2E
        run: |
          touch .env
          npm run login:browserbase
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          BROWSERBASE_CONTEXT_ID: ${{ secrets.E2E_BROWSERBASE_CONTEXT_ID }}
          TDF_EMAIL: ${{ secrets.TDF_EMAIL }}
          TDF_PASSWORD: ${{ secrets.TDF_PASSWORD }}

      - name: Exercise E2E Worker and Telegram delivery
        run: npm run worker:e2e
        env:
          E2E_LOCAL_WORKER: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          E2E_COOKIE_FORM_TOKEN: ${{ secrets.E2E_COOKIE_FORM_TOKEN }}
          E2E_TELEGRAM_CHAT_ID: ${{ secrets.E2E_TELEGRAM_CHAT_ID }}
