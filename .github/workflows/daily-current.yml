name: Daily Current TDF Offers

on:
  schedule:
    # Run at both possible UTC hours for 9am America/New_York.
    # The guard step below sends only when the New York hour is actually 09.
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tdf-daily-current
  cancel-in-progress: false

jobs:
  send-current:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check 9am New York guard
        id: time_guard
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(TZ=America/New_York date +%H)" == "09" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.time_guard.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.time_guard.outputs.should_run == 'true'
        run: npm ci

      - name: Type check
        if: steps.time_guard.outputs.should_run == 'true'
        run: npm run check

      - name: Run tests
        if: steps.time_guard.outputs.should_run == 'true'
        run: npm test

      - name: Fetch TDF cookie from Cloudflare
        if: steps.time_guard.outputs.should_run == 'true'
        run: |
          curl -fsS "https://tdf-alerts-bot.salmanrazzaq94.workers.dev/tdf-cookie?token=${COOKIE_FORM_TOKEN}" > /tmp/tdf-cookie.txt
          {
            echo "TDF_COOKIE<<EOF"
            cat /tmp/tdf-cookie.txt
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          COOKIE_FORM_TOKEN: ${{ secrets.COOKIE_FORM_TOKEN }}

      - name: Send current TDF offers digest
        id: send_current
        continue-on-error: true
        if: steps.time_guard.outputs.should_run == 'true'
        run: npm run build && npm run send-current
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit run log
        if: always()
        run: |
          if [[ -n "$(git status --porcelain data/run-log.jsonl)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/run-log.jsonl
            git commit -m "Update TDF run log"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:${GITHUB_REF_NAME}
          else
            echo "No run log changes to commit."
          fi

      - name: Fail if daily digest failed
        if: steps.send_current.outcome == 'failure'
        run: exit 1
