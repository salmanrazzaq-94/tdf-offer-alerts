name: Check TDF Offers

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tdf-offer-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Fetch TDF cookie from Cloudflare
        run: |
          curl -fsS "https://tdf-alerts-bot.salmanrazzaq94.workers.dev/tdf-cookie?token=${COOKIE_FORM_TOKEN}" > /tmp/tdf-cookie.txt
          {
            echo "TDF_COOKIE<<EOF"
            cat /tmp/tdf-cookie.txt
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          COOKIE_FORM_TOKEN: ${{ secrets.COOKIE_FORM_TOKEN }}

      - name: Check TDF offers
        id: check_tdf
        continue-on-error: true
        run: npm run build && npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit seen-offers snapshot
        if: always()
        run: |
          if [[ -n "$(git status --porcelain data/seen-offers.json data/auth-state.json data/run-log.jsonl)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen-offers.json data/auth-state.json data/run-log.jsonl
            git commit -m "Update TDF watcher state"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:${GITHUB_REF_NAME}
          else
            echo "No state changes to commit."
          fi

      - name: Fail if TDF check failed
        if: steps.check_tdf.outcome == 'failure'
        run: exit 1
